<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Personal Birthday Card</title>
    <link rel="stylesheet" href="./style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Dancing+Script:wght@700&family=Caveat:wght@700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>

    <div class="card" id="card">
        <div class="cover">
            <div class="front">
                <div class="decoration">🌙✨</div>
                <p style="letter-spacing: 4px; font-size: 0.8rem;">EID MUBARAK</p>
                <h1>Eid Wishes</h1>
                <p>Click to Open</p>
            </div>
            <div class="back">
                <div class="photo-frame">
                    <img src="./eidMubarak.jpg">
                </div>
            </div>
        </div>

        <div class="inner">
            <h2>Eid Mubarak!</h2>
            <p class="message">
                May this Eid bring peace, happiness, and countless blessings into your life.
                May your heart be filled with joy and your home with love 🌙✨</p>
            <div class="signature">- From Ayesha</div>
            <button class="btn-celebrate" onclick="party(event)">Celebrate 🎉</button>
        </div>
    </div>

    <script src="./script.js"></script>
</body>

</html>
